name: Daily Update - Scrape DokkanInfo

on:
  workflow_dispatch:
  schedule:
    # 毎日 JST 06:00 (UTC 21:00 前日)
    - cron: '0 21 * * *'

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./scraper
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./scraper
        run: npx playwright install chromium --with-deps

      - name: Run full event scraper
        working-directory: ./scraper
        run: node scrape-all-events.js

      - name: Inject data into calculator JS
        working-directory: ./scraper
        run: node update-preset.js

      - name: Commit updated files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add scraper/all_enemies.json dokkan_calc_final.js
          git diff --staged --quiet || git commit -m "chore: daily enemy data update [skip ci]"
          git push
